# OV footstep sound collections.
#
# Mythos: Track I (audio) of the V1 OV character port. These wrap OV's
# `sound/foley/footsteps/` library so Mythos species and shoes can
# reference them via `FootstepModifierComponent.footstepSoundCollection`
# (and species YAML, see Resources/Prototypes/_Mythos/Species/).
#
# Mapping derived from `Updated/Ochre-Valley/code/__DEFINES/footsteps.dm`.
# Surface-tagged collections (FT*_A1..A4) cover wood, dirt, grass, metal,
# carpet, stone, tile, water, mud, shallow, fungus, and snow. The barefoot,
# heavy, hoof, and armor variants live alongside.

# --- Surface collections ---------------------------------------------------

- type: soundCollection
  id: OVFootstepWood
  files:
