  bodyPart: UndergarmentBottom
  category: Underwear
  groupWhitelist: [Human, Humen, Aasimar, HalfElf, Tiefling, Dullahan, Demihuman]
  sexRestriction: Male
  # The male leotard shares the chest-covering silhouette of the
  # female variant; OV's /obj/item/undies/leotard isn't gender-locked,
  # so apply covers_breasts symmetrically. Visible only when a male
  # character has selected a non-flat breast size (rare but supported).
  coversBreasts: true
  coloring:
    default:
      type: null
      fallbackColor: '#FFFFFF'
  sprites:
  - sprite: _Mythos/Underwear/underwear.rsi
    state: male_leotard

